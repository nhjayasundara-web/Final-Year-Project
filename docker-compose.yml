services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: change-this-secret
      JWT_SECRET: change-this-jwt-secret
      MONGO_URI: mongodb://mongo:27017/hope_app
      MONGO_DB_NAME: hope_app
      CORS_ORIGINS: http://localhost:8080
      UPLOAD_FOLDER: uploads
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
